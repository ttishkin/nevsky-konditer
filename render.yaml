# Render Blueprint — разворачивает приложение «Невский Кондитер — ЗОЖ» одним блюпринтом.
# На render.com: New + → Blueprint → выбрать этот репозиторий → Apply.
services:
  - type: web
    name: nevsky-konditer
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/products
    autoDeploy: true
    envVars:
      - key: JWT_SECRET
        generateValue: true        # Render сам сгенерирует секрет
      - key: MAIL_FROM
        value: "Невский Кондитер <no-reply@nk.ru>"
      # Для реальной почты добавьте SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS
